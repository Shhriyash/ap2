<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent2Pay | Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <span class="brand-pill" aria-hidden="true"></span>
        <span class="brand-text">Agent2Pay</span>
      </div>
      <nav class="top-nav" aria-label="Primary">
        <a href="./index.html">Home</a>
        <a href="./agent-logs.html">Agent Logs</a>
      </nav>
    </header>

    <main id="main-content">
      <section class="signup-shell reveal">
        <div class="signup-card" aria-live="polite">
          <div class="signup-head">
            <h2>Signup Dashboard</h2>
            <p>Complete your user onboarding in four steps.</p>
          </div>

          <div class="stepper" role="tablist" aria-label="Signup Steps">
            <button class="step is-active" data-step="1" type="button" role="tab" aria-selected="true">1. Details</button>
            <button class="step" data-step="2" type="button" role="tab" aria-selected="false">2. PIN</button>
            <button class="step" data-step="3" type="button" role="tab" aria-selected="false">3. OTP</button>
            <button class="step" data-step="4" type="button" role="tab" aria-selected="false">4. Complete</button>
          </div>

          <div class="step-content">
            <section id="step-1" class="step-panel is-visible" role="tabpanel">
              <h3>Step 1: General Details</h3>
              <form id="signup-form" novalidate>
                <label for="full-name">Full name</label>
                <input id="full-name" name="full_name" required minlength="2" maxlength="150" />

                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />

                <label for="account-password">Account password</label>
                <input id="account-password" name="password" type="password" minlength="6" required />

                <label for="account-password-confirm">Confirm account password</label>
                <input id="account-password-confirm" name="confirm_password" type="password" minlength="6" required />

                <label for="phone">Phone (E.164 preferred)</label>
                <input id="phone" name="phone" placeholder="+971500000001" />

                <button class="btn btn-primary" type="submit">Create Signup</button>
                <p id="signup-message" class="feedback" role="status"></p>
              </form>
            </section>

            <section id="step-2" class="step-panel" role="tabpanel" hidden>
              <h3>Step 2: Set PIN</h3>
              <form id="pin-form" novalidate>
                <label for="pin">PIN (4 to 8 digits)</label>
                <input id="pin" name="pin" type="password" inputmode="numeric" minlength="4" maxlength="8" required />

                <label for="confirm-pin">Confirm PIN</label>
                <input id="confirm-pin" name="confirm_pin" type="password" inputmode="numeric" minlength="4" maxlength="8" required />

                <button class="btn btn-primary" type="submit">Save PIN</button>
                <p id="pin-message" class="feedback" role="status"></p>
              </form>
            </section>

            <section id="step-3" class="step-panel" role="tabpanel" hidden>
              <h3>Step 3: OTP Device Setup</h3>
              <form id="otp-start-form" novalidate>
                <label for="otp-channel">Channel</label>
                <select id="otp-channel" name="channel">
                  <option value="email">Email</option>
                  <option value="sms">SMS</option>
                </select>

                <label for="otp-destination">Destination</label>
                <input id="otp-destination" name="destination" required placeholder="email or phone" />

                <button class="btn btn-primary" type="submit">Send OTP</button>
              </form>

              <form id="otp-verify-form" novalidate>
                <label for="otp-code">OTP Code</label>
                <input id="otp-code" name="otp_code" inputmode="numeric" required placeholder="Enter OTP" />

                <button class="btn btn-primary" type="submit">Verify OTP</button>
              </form>
              <p id="otp-message" class="feedback" role="status"></p>
            </section>

            <section id="step-4" class="step-panel" role="tabpanel" hidden>
              <h3>Step 4: Completion</h3>
              <p>Your signup is complete once verification checks pass.</p>
              <button id="refresh-status-btn" class="btn btn-secondary" type="button">Refresh Status</button>
              <div id="final-summary" class="summary" aria-live="polite"></div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
