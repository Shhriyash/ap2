<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Agent Assistant | Live Agent Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <span class="brand-pill" aria-hidden="true"></span>
        <span class="brand-text">Payment Agent Assistant</span>
      </div>
      <nav class="top-nav" aria-label="Primary">
        <a href="./signup.html">Signup</a>
        <a href="./index.html#features">Features</a>
        <a href="./agent-logs.html">Agent Logs</a>
      </nav>
    </header>

    <main id="main-content">
      <section class="hero reveal">
        <div class="hero-copy">
          <p class="eyebrow">User agent activity</p>
          <h1>Live Agent Logs</h1>
          <p class="hero-sub">Track latest session state updates for a user agent in a dedicated page.</p>
        </div>
      </section>

      <section class="logs-shell reveal">
        <article class="logs-card" aria-live="polite">
          <h2>Session Stream</h2>
          <p class="hero-sub">Provide a session id and start live tracking.</p>

          <form id="logs-form" class="logs-controls" novalidate>
            <label for="session-id">Session ID</label>
            <input id="session-id" name="session_id" required placeholder="e.g. sess_abc123" />

            <label for="user-id">User ID (optional)</label>
            <input id="user-id" name="user_id" placeholder="e.g. user_x" />

            <div class="logs-actions">
              <button id="start-logs" class="btn btn-primary" type="submit">Start Live Logs</button>
              <button id="stop-logs" class="btn btn-secondary" type="button">Stop</button>
              <button id="clear-logs" class="btn btn-secondary" type="button">Clear</button>
            </div>
          </form>

          <p id="logs-status" class="feedback logs-status" role="status"></p>
          <ul id="logs-feed" class="logs-feed"></ul>
        </article>
      </section>
    </main>

    <script type="module" src="./agent-logs.js"></script>
  </body>
</html>
